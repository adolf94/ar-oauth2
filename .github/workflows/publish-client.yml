name: Publish Auth Client

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@adolf94'

      - name: Install Dependencies
        run: |
          cd ar-auth-client
          npm install

      - name: Build
        run: |
          cd ar-auth-client
          npm run build

      - name: Publish to GitHub Packages
        run: |
          cd ar-auth-client
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
